name: Build and Release SLCode

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version label (defaults to tag name or short SHA)
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller pywebview pythonnet

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          if ($inputVersion) {
            $ver = $inputVersion
          } elseif ($env:GITHUB_REF -like 'refs/tags/*') {
            $ver = $env:GITHUB_REF_NAME
          } else {
            $ver = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          "RELEASE_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Release version: $ver"

      - name: Build and package
        shell: pwsh
        run: |
          ./make-release.ps1 -Version $env:RELEASE_VERSION

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: SLCode-${{ env.RELEASE_VERSION }}
          path: release/SLCode-${{ env.RELEASE_VERSION }}.zip
          if-no-files-found: error

      - name: Publish GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/SLCode-${{ env.RELEASE_VERSION }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
